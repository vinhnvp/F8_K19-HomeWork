<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Sản phẩm</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/MaterialDesign-Webfont/7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./tailwind.config.js"></script>
</head>
<body class="bg-surface">
    <header class="bg-white px-8 pt-6 pb-4">
        <div class="max-w-main m-auto flex justify-between items-center">
            <!-- Logo -->
            <a href="#" class="text-2xl font-bold text-primary flex items-center">
                <span class="mdi mdi-cart-outline text-3xl text-primary"></span>
                FakeStore
            </a>
            <!-- Seach Box -->
            <div class="w-[36vw] relative">
                <label for="products-searchbox" class="absolute top-1.5 left-4">
                    <span class="mdi mdi-magnify text-2xl text-[#b3becd]"></span>
                </label>
                <input type="search" name="" id="products-searchbox" placeholder="Tìm kiếm sản phẩm..."
                class="w-full py-2 pl-12 pr-2 bg-surface border border-light-grey focus:border-primary focus:shadow-blue transition-shadow duration-200 rounded-full outline-none">
            </div>
            <!-- Cart -->
            <button class="relative">
                <span class="cart-badge absolute -top-3 -right-2 px-2 bg-[#ee4646] text-white text-sm font-medium rounded-xl"></span>
                <span class="mdi mdi-cart-outline text-2xl text-[#6d7b90]"></span>
            </button>
        </div>
        
    </header>

    <div class="grid grid-cols-12 gap-8 items-start max-w-main mx-auto py-8">
        <aside class="col-span-3 bg-white p-4 rounded-xl shadow-soft border border-surface">
            <div>
                <h2 class="text-2xl font-bold mb-4">
                    <span class="mdi mdi-filter-multiple-outline"></span>
                    Danh mục
                </h2>
                <ul class="product-categories flex flex-col font-medium gap-2">

                </ul>
            </div>
        </aside>

        <!-- Product list -->
        <main class="col-span-9">
            <div>
                <h2 class="category-name font-bold text-2xl text-dark capitalize">Tất cả sản phẩm</h2>
                <p class="text-grey">Hiển thị <span class="category-quantity">20</span> sản phẩm</p>
            </div>

            <div class="product-list flex gap-4 flex-wrap mt-4">

            </div>
        </main>
    </div>

    
    <script src="index.js"></script>
</body>
</html>
