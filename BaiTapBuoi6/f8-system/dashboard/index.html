<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <title>Dashboard</title>
    <style>
        h1 {
            color: red;
        }

        p.highlight,
        .section {
            color: brown
        }
    </style>
</head>
<body>
    <!--
        Phần tử h1 có đủ: tag(h1) + class(.title) + id(#special) + inline style
        Selector thắng: inline style, vì inline style mạnh nhất (điểm cao nhất)
        Màu hiển thị: orange
    -->
    <h1 class="title" id="special" style="color: orange;">DASHBOARD</h1>
    <h2 class="section" style="font-size: 28px">Tong quan he thong</h2>
    <h3 class="title">Courses</h3>
        <p class="highlight">Courses Details</p>
    <h3 class="title">Students</h3>
        <p class="highlight">Students Details</p>
    <h3 class="title">Teachers</h3>
        <p class="highlight">Teachers Details</p>
    <h3 class="title">Orders</h3>
        <p class="highlight">Orders Details</p>
    <h3 class="title">Reports</h3>
        <p class="highlight">Reports Details</p>
    <div class="big"></div>
</body>
</html>
