<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <title>Orders Page</title>
    <style>
        h2 {
            color: orange;
        }
    </style>
</head>
<body>
    <h1 style="color: pink;">ORDERS PAGE</h1>
    <!--
        Phần tử h2 có đủ: tag(h2) + class(.title) + id(#special) + inline style
        Selector thắng: inline style, vì inline style mạnh nhất (điểm cao nhất)
        Màu hiển thị: black
    -->
    <h2 class="title" id="special" style="color: black">Danh sach don hang</h2>
        <p style="color: yellow">Don hang 001</p>
        <p style="color: yellow">Don hang 002</p>
        <p class="highlight">Don hang 003</p>
        <p class="highlight">Don hang 004</p>
</body>
</html>
