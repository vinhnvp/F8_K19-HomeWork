<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Create shapes with border</title>
    <style>
        * {
            margin: 0;
            padding: 0
        }
        h1 {
            padding: 12px;
        }
        .shape_container {
            min-width: 100px;
            min-height: 150px;
            margin: 12px;
            padding: 12px;
            display: inline-block;
            vertical-align: bottom
        }
        .shape_name {
            padding: 12px 0;
            font-size: 1.1em
        }


        /* Hinh vuong - Square */
        .square {
            width: 120px;
            height: 120px;
            border: 4px solid red
        }
        .rectangle {
            width: 180px;
            height: 120px;
            border: 4px solid blue
        }
        .triangle--top {
            width: 0;
            height: 0;
            border-right: 60px solid transparent;
            border-bottom: 120px solid orange;
            border-left: 60px solid transparent
        }
        .triangle--bottom {
            width: 0;
            height: 0;
            border-right: 60px solid transparent;
            border-top: 120px solid green;
            border-left: 60px solid transparent
        }
        .triangle--left {
            width: 0;
            height: 0;
            border-top: 60px solid transparent;
            border-right: 120px solid brown;
            border-bottom: 60px solid transparent
        }
        .triangle--right {
            width: 0;
            height: 0;
            border-top: 60px solid transparent;
            border-left: 120px solid darkblue;
            border-bottom: 60px solid transparent
        }
        .trapezoid {
            width: 80px;
            border-right: 60px solid transparent;
            border-left: 60px solid transparent;
            border-bottom: 120px solid darkcyan
        }
        .triangle--wide {
            width: 0;
            height: 0;
            border-top: 60px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 60px solid red;
            border-left: 100px solid transparent
        }
        .triangle--high {
            width: 0;
            height: 0;
            border-right: 30px solid transparent;
            border-bottom: 120px solid black;
            border-left: 30px solid transparent
        }
        .triangle--equal {
            width: 0;
            height: 0;
            border-right: 80px solid transparent;
            border-bottom: 120px solid pink;
            border-left: 80px solid transparent
        }
        .arrow--right {
            width: 0;
            height: 0;
            border-top: 30px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 30px solid transparent;
            border-left: 60px solid darkorange;
            margin-top: 60px
        }
        .arrow--left {
            width: 0;
            height: 0;
            border-top: 30px solid transparent;
            border-right: 60px solid darkorange;
            border-bottom: 30px solid transparent;
            border-left: 60px solid transparent;
            margin-top: 60px
        }
        .ribbon {
            width: 40px;
            height: 0;
            border-top: 60px solid lightgreen;
            border-right: 60px solid transparent;
            border-bottom: 60px solid lightgreen;
            border-left: 60px solid lightgreen
        }

        .letter_wrapper {
            display: inline-block
        }
        .mg-left-4 {
            margin-left: 4px
        }
        .f8--f_letter {
            width: 70px;
            height: 120px;
            border-top: 20px solid red;
            border-left: 20px solid red;
            box-sizing: border-box
        }
        .f8--f_letter_line {
            margin-top: 30px;
            border-top: 20px solid red
        }
        .f8--num_8 {
            width: 80px;
            height: 120px;
            border: 20px solid red;
            box-sizing: border-box
        }
        .f8--num_8_line {
            margin-top: 30px;
            border-top: 20px solid red
        }


    </style>
</head>
<body>
    <h1>Các hình có thể tạo được với Border</h1>

    <!-- 1. Hình vuông -->
    <span class="shape_container">
        <div class="square"></div>
        <p class="shape_name">1. Hình vuông</p>
    </span>
    <!-- 2. Hình chữ nhật -->
    <span class="shape_container">
        <div class="rectangle"></div>
        <p class="shape_name">2. Hình chữ nhật</p>
    </span>
    <span class="shape_container">
        <div class="triangle--top"></div>
        <p class="shape_name">3. Tam giác lên</p>
    </span>
    <span class="shape_container">
        <div class="triangle--bottom"></div>
        <p class="shape_name">4. Tam giác xuống</p>
    </span>
    <span class="shape_container">
        <div class="triangle--left"></div>
        <p class="shape_name">5. Tam giác trái</p>
    </span>
    <span class="shape_container">
        <div class="triangle--right"></div>
        <p class="shape_name">6. Tam giác phải</p>
    </span>
    <span class="shape_container">
        <div class="trapezoid"></div>
        <p class="shape_name">7. Hình thang</p>
    </span>
    <span class="shape_container">
        <div class="triangle--wide"></div>
        <p class="shape_name">8. Tam giác rộng</p>
    </span>
    <span class="shape_container">
        <div class="triangle--high"></div>
        <p class="shape_name">9. Tam giác nhọn</p>
    </span>
    <span class="shape_container">
        <div class="triangle--equal"></div>
        <p class="shape_name">10. Tam giác cân</p>
    </span>
    <span class="shape_container">
        <div class="arrow--right"></div>
        <p class="shape_name">11. Mũi tên phải</p>
    </span>
    <span class="shape_container">
        <div class="arrow--left"></div>
        <p class="shape_name">12. Mũi tên trái</p>
    </span>
    <span class="shape_container">
        <div class="ribbon"></div>
        <p class="shape_name">13. Ribbon / Lá cờ</p>
    </span>
    <span class="shape_container">
        <div class="f8">
            <span class="letter_wrapper">
                <div class="f8--f_letter">
                    <div class="f8--f_letter_line"></div>
                </div>
            </span>
            <span class="letter_wrapper mg-left-4">
                <div class="f8--num_8">
                    <div class="f8--num_8_line"></div>
                </div>
            </span>


        </div>
        <p class="shape_name">14. F8</p>
    </span>


</body>
</html>
