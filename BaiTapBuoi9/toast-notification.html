<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Toast Notification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        html {
            font-size: 62.5%;
            font-family: "Inter", sans-serif;
        }
        body {
            font-size: 1.6rem;
        }

        .toast-noti-container {
            padding: 2em;
            margin: 1em;
            border-radius: 12px;
        }
        .open-btn,
        .close-btn {
            display: inline-block;
            font-weight: bold;
            cursor: pointer;
        }
        .open-btn {
            padding: 12px 24px;
            margin-right: 18px;
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 0.05rem;
            border-radius: 4px;

        }
        .close-btn {
            font-size: 2rem;
            margin-left: 12px;
            color: #333333;
            padding: 0.2em 0.4em;
            border-radius: 50px;
            background-color: #a3e7a3;
        }
        .save-icon {
            margin-bottom: -3px;
        }

    /*
    - CSS cụm thông báo thành công
    - Mặc định thông báo toast này sẽ ẩn - display: none
    */
        .toast {
            display: inline-block;
            border-radius: 4px;
            background-color: #dcffdc;
            border: 1px solid #62d129;
            padding: 12px;
            display: none;
        }
        .toast--success {
            padding: 4px;
            font-weight: bold;
            color: #333333;
        }


    /*
    - Bấm "Lưu ghi chú" --> input được checked --> hiện toast (inline-block ghi đè none)
    - Gán for=id của input cho nút close --> bấm vào unchecked sẽ trở về mặc định none
    */
        #toast-toggle:checked ~ .toast {
            display: inline-block;
        }


    </style>
</head>
<body>
    <div class="toast-noti-container">
        <input type="checkbox" id="toast-toggle" hidden>
        <label for="toast-toggle" class="open-btn">Lưu ghi chú</label>
        <div class="toast">
            <svg class="save-icon" width="20" height="20" fill="#166534" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            <span class="toast--success">Lưu thành công</span>
            <label for="toast-toggle" class="close-btn">&times;</label>
        </div>
    </div>

</body>
</html>
