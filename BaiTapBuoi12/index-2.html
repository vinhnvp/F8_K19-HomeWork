<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="style-2.css">
    <title>Dwellys Exclusives</title>
</head>
<body>

    <div class="title-container">
        <h1>Dwellys Exclusives</h1>
        <p>Best deals and offers at a glance.</p>
        <p>Here are our most trendy properties for today</p>
    </div>

    <!-- Properties (3 x 2 layout) -->
    <div class="property-container">
        <!-- Property 1 -->
        <div class="property">
            <div class="property-img">
                <img
                    src="https://images.unsplash.com/photo-1556912173-46c336c7fd55?w=400"
                    alt="4 Bedroom Double Storey Townhouse">
            </div>

            <div class="property-details">
                <div class="property-address">
                    <span class="mdi mdi-map-marker"></span>
                    <span>Accra, Greater Accra</span>
                </div>
                <div class="property-name">4 Bedroom Double Storey Townhouse</div>
                <div class="property-info--top">
                    <div class="property-info--top__owner">
                        <span class="property-info--top__owner-avatar">
                            <span class="mdi mdi-account"></span>
                        </span>
                        <span>Dwellys Properties</span>
                    </div>
                    <div class="property-info--top__posted-time">
                        <span class="mdi mdi-calendar"></span>
                        <span>2 days ago</span>
                    </div>
                </div>
                <div class="property-info--bottom">
                    <div class="property-info--bottom__square">
                        <span class="property-info--bottom__square-icon">
                            <span class="mdi mdi-floor-plan"></span>
                        </span>
                        <span>240sqft</span>
                    </div>
                    <div class="property-info--bottom__bedroom">
                        <span class="property-info--bottom__bedroom">
                            <span class="mdi mdi-bed"></span>
                        </span>
                        <span>4</span>
                    </div>
                    <div class="property-info--bottom__bathroom">
                        <span class="property-info--bottom__bathroom">
                            <span class="mdi mdi-shower"></span>
                        </span>
                        <span>4</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Property 2 -->
    </div>
</body>
</html>
